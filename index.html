<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>SPOEX 2026 Leaderboard</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #5252FA;
    --accent: #BAFC27;
    --bg: #0A0A0F;
    --bg-card: #12121A;
    --bg-row: #1A1A25;
    --bg-row-alt: #15151F;
    --text: #EEEEF2;
    --text-dim: #8888A0;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --orange: #FF6B35;
  }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 1920px; height: 1080px;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: 100px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: linear-gradient(180deg, #111118 0%, var(--bg) 100%);
    border-bottom: 1px solid #222233;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { height: 36px; filter: brightness(0) invert(1); }
  .event-badge {
    background: var(--primary); color: #fff;
    font-size: 14px; font-weight: 700;
    padding: 5px 14px; border-radius: 6px; letter-spacing: 1px;
  }

  .header-center { display: flex; gap: 4px; }
  .tab-btn {
    background: transparent; border: 1px solid #333; color: var(--text-dim);
    font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 8px;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  .tab-btn:hover { border-color: #555; color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 800; }

  .header-right { display: flex; align-items: center; gap: 28px; }
  .live-dot {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; color: var(--accent);
  }
  .live-dot::before {
    content: ''; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(186,252,39,.6); }
    50% { opacity: .7; box-shadow: 0 0 0 8px rgba(186,252,39,0); }
  }
  .clock { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .btn-fs {
    background: transparent; border: 1px solid #444; color: var(--text-dim);
    font-size: 13px; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  .btn-fs:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN ── */
  main {
    flex: 1; display: flex; gap: 20px;
    padding: 20px 48px 0; min-height: 0;
  }

  .panel {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg-card); border-radius: 16px;
    border: 1px solid #222233; overflow: hidden;
    transition: flex .3s;
  }
  .panel.hidden-panel { display: none; }

  .panel-header {
    padding: 20px 28px 16px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .panel-icon { font-size: 32px; line-height: 1; }
  .panel-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .panel-title span { color: var(--text-dim); font-weight: 500; font-size: 16px; margin-left: 8px; }

  .panel.mjolnir .panel-header { border-bottom: 3px solid var(--orange); }
  .panel.power .panel-header { border-bottom: 3px solid var(--accent); }

  /* ── TABLE ── */
  .board {
    flex: 1; display: flex; flex-direction: column;
    padding: 0 16px 12px; min-height: 0;
  }

  .row-header, .row {
    display: flex; align-items: center;
    padding: 0 16px; border-radius: 10px; flex-shrink: 0;
  }

  .row-header {
    height: 36px; font-size: 12px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }

  .row {
    height: 62px; margin-bottom: 4px;
    transition: all .3s;
  }
  /* Solo tab: bigger everything */
  .panel.solo .board { padding: 0 24px 12px; }
  .panel.solo .row { height: 70px; margin-bottom: 4px; padding: 0 24px; }
  .panel.solo .col-rank { width: 80px; font-size: 36px; }
  .panel.solo .row.top1 .col-rank,
  .panel.solo .row.top2 .col-rank,
  .panel.solo .row.top3 .col-rank { font-size: 42px; }
  .panel.solo .col-name { font-size: 32px; }
  .panel.solo .col-title { font-size: 22px; width: 380px; }
  .panel.solo .col-score { font-size: 44px; width: 200px; }
  .panel.solo .col-sub { font-size: 20px; width: 160px; }
  .panel.solo .col-exercise { font-size: 20px; width: 180px; }
  .panel.solo .panel-title { font-size: 32px; }
  .panel.solo .panel-icon { font-size: 40px; }
  .panel.solo .row-header { font-size: 14px; height: 40px; }
  .row:nth-child(odd) { background: var(--bg-row); }
  .row:nth-child(even) { background: var(--bg-row-alt); }

  .row.top1 { background: linear-gradient(90deg, rgba(255,215,0,.12) 0%, transparent 60%); border-left: 3px solid var(--gold); }
  .row.top2 { background: linear-gradient(90deg, rgba(192,192,192,.08) 0%, transparent 60%); border-left: 3px solid var(--silver); }
  .row.top3 { background: linear-gradient(90deg, rgba(205,127,50,.08) 0%, transparent 60%); border-left: 3px solid var(--bronze); }

  .row.highlight { animation: highlight-pulse 2.5s ease-out; }
  @keyframes highlight-pulse {
    0% { background: rgba(186,252,39,.25); transform: scale(1.01); }
    100% { background: transparent; transform: scale(1); }
  }

  .col-rank { width: 60px; text-align: center; font-size: 22px; font-weight: 800; }
  .row.top1 .col-rank, .row.top2 .col-rank, .row.top3 .col-rank { font-size: 28px; }

  .col-name {
    flex: 1; font-size: 20px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .col-title {
    width: 260px; font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 16px;
  }
  .panel.mjolnir .col-title { color: var(--orange); }
  .panel.power .col-title { color: var(--accent); opacity: .85; }

  .col-score {
    width: 140px; text-align: right;
    font-size: 28px; font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .panel.mjolnir .col-score { color: var(--orange); }
  .panel.power .col-score { color: var(--accent); }

  .col-sub {
    width: 120px; text-align: right;
    font-size: 14px; color: var(--text-dim); padding-left: 8px;
  }

  .col-exercise {
    width: 130px; text-align: right;
    font-size: 14px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-empty {
    display: flex; align-items: center; justify-content: center;
    flex: 1; color: var(--text-dim); font-size: 18px;
  }

  /* Tier divider */
  .tier-divider {
    height: 1px; margin: 6px 16px;
    background: linear-gradient(90deg, transparent, #333, transparent);
    flex-shrink: 0;
  }

  /* Spotlight banner for new entry */
  .spotlight {
    background: linear-gradient(90deg, rgba(186,252,39,.12), rgba(82,82,250,.08), transparent);
    border: 1px solid rgba(186,252,39,.35);
    border-radius: 12px;
    padding: 12px 24px;
    margin: 0 48px 8px;
    display: flex; align-items: center; gap: 20px;
    animation: spotlight-glow 2s ease-in-out infinite alternate;
    flex-shrink: 0;
  }
  .spotlight.hidden { display: none; }
  @keyframes spotlight-glow {
    from { border-color: rgba(186,252,39,.35); }
    to { border-color: rgba(186,252,39,.65); }
  }
  .spotlight-new { font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
  .spotlight-name { font-size: 24px; font-weight: 800; }
  .spotlight-title { font-size: 16px; font-weight: 600; }
  .panel.mjolnir ~ .spotlight .spotlight-title,
  .spotlight.mj .spotlight-title { color: var(--orange); }
  .spotlight.vbt .spotlight-title { color: var(--accent); }
  .spotlight-score { font-size: 28px; font-weight: 900; margin-left: auto; font-variant-numeric: tabular-nums; }
  .spotlight.mj .spotlight-score { color: var(--orange); }
  .spotlight.vbt .spotlight-score { color: var(--accent); }
  .spotlight-rank { font-size: 16px; color: var(--text-dim); white-space: nowrap; }

  /* ── FOOTER ── */
  footer {
    height: 72px;
    display: flex; align-items: center; justify-content: center;
    gap: 60px; padding: 0 48px;
    background: linear-gradient(0deg, #111118 0%, var(--bg) 100%);
    border-top: 1px solid #222233; flex-shrink: 0;
  }
  .stat { display: flex; align-items: center; gap: 10px; }
  .stat-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }
  .stat-value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.primary { color: var(--orange); }
  .stat-divider { width: 1px; height: 32px; background: #333; }
  .power-desc { font-size: 13px; color: var(--text-dim); max-width: 400px; }

  /* ── BG glow ── */
  .glow-left, .glow-right {
    position: fixed; width: 500px; height: 500px;
    border-radius: 50%; filter: blur(200px); opacity: .08;
    pointer-events: none; z-index: -1;
  }
  .glow-left { top: 200px; left: -100px; background: var(--primary); }
  .glow-right { top: 200px; right: -100px; background: var(--accent); }
</style>
</head>
<body>

<div class="glow-left"></div>
<div class="glow-right"></div>

<div class="container">
  <header>
    <div class="header-left">
      <img class="logo" src="https://wspn-images.wespion.workers.dev/roomfit-logo.png" alt="Roomfit">
      <div class="event-badge">SPOEX 2026</div>
    </div>
    <div class="header-center">
      <button class="tab-btn active" data-tab="both">🏆 전체</button>
      <button class="tab-btn" data-tab="mjolnir">🔨 묠니르</button>
      <button class="tab-btn" data-tab="power">⚡ Power Score</button>
    </div>
    <div class="header-right">
      <div class="live-dot">LIVE</div>
      <div class="clock" id="clock">00:00:00</div>
      <button class="btn-fs" id="btnFs" title="Fullscreen">&#x26F6;</button>
    </div>
  </header>

  <!-- Spotlight for new entries -->
  <div class="spotlight hidden" id="spotlight">
    <div class="spotlight-new">🎉 NEW</div>
    <div class="spotlight-name" id="spotName">-</div>
    <div class="spotlight-title" id="spotTitle">-</div>
    <div class="spotlight-score" id="spotScore">-</div>
    <div class="spotlight-rank" id="spotRank">-</div>
  </div>

  <main>
    <!-- Mjolnir -->
    <div class="panel mjolnir" id="panelMjolnir">
      <div class="panel-header">
        <div class="panel-icon">🔨</div>
        <div class="panel-title">묠니르 챌린지 <span>Top 10</span></div>
      </div>
      <div class="board" id="boardMjolnir">
        <div class="row-header">
          <div class="col-rank">#</div>
          <div class="col-name">닉네임</div>
          <div class="col-title">칭호</div>
          <div class="col-score">점수</div>
          <div class="col-sub">최대높이</div>
        </div>
      </div>
    </div>

    <!-- Power Score -->
    <div class="panel power" id="panelPower">
      <div class="panel-header">
        <div class="panel-icon">⚡</div>
        <div class="panel-title">Power Score <span>Top 10</span></div>
      </div>
      <div class="board" id="boardPower">
        <div class="row-header">
          <div class="col-rank">#</div>
          <div class="col-name">닉네임</div>
          <div class="col-title">칭호</div>
          <div class="col-score">점수</div>
          <div class="col-exercise">운동</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="stat">
      <span class="stat-label">오늘 참가자</span>
      <span class="stat-value accent" id="statCount">-</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">묠니르 최고</span>
      <span class="stat-value primary" id="statMjolnirBest">-</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Power Score 최고</span>
      <span class="stat-value accent" id="statPowerBest">-</span>
    </div>
    <div class="stat-divider"></div>
    <div class="power-desc">Power Score = 속도 기반 근파워 측정 (VBT). 무게 × 속도로 폭발력을 수치화합니다.</div>
  </footer>
</div>

<script>
const SUPABASE_URL = 'https://ssidizurrvnfmqbvfsqr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaWRpenVycnZuZm1xYnZmc3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDg1OTgsImV4cCI6MjA4NzQyNDU5OH0.3UMwz8QPAOoN_hFu-EaheLQunHdpJk_WvMjxuiONRSI';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const MEDALS = ['', '🥇', '🥈', '🥉'];

// ── Title System (unique per ID via hash-seed) ──
function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function seededPick(arr, seed) { return arr[seed % arr.length]; }

const titleCache = {};
function getTitle(rank, isMj, id) {
  const key = id || `${rank}-${isMj}`;
  if (titleCache[key]) return titleCache[key];
  const t = _genTitle(rank, isMj, hashCode(key));
  titleCache[key] = t;
  return t;
}

// Modifiers to make every title unique
const MJ_PREFIX = ['전설의', '불멸의', '고대의', '최후의', '진정한', '광기의', '폭풍의', '얼음의', '불꽃의', '영원의', '어둠의', '신성한', '무적의', '강철의'];
const VBT_PREFIX = ['ULTRA', 'MEGA', 'HYPER', 'SUPREME', 'PRIME', 'ELITE', 'APEX', 'OMEGA', 'TURBO', 'CORE', 'FURY', 'MAX', 'NEO', 'TITAN'];

function _genTitle(rank, isMj, seed) {
  const s2 = (seed >> 3) | 1; // secondary seed for modifier
  if (isMj) {
    const pfx = seededPick(MJ_PREFIX, s2);
    if (rank === 1) return `⚡ ${pfx} 토르의 후계자`;
    if (rank === 2) return `🔨 ${pfx} 묠니르의 주인`;
    if (rank === 3) return `🛡️ ${pfx} 아스가르드 전사`;
    const t4 = ['바이킹 챔피언', '발할라 입성자', '울프 워리어', '전장의 사자'];
    if (rank <= 5) return `⚔️ ${pfx} ${seededPick(t4, seed)}`;
    const t6 = ['미드가르드의 힘', '버서커', '산을 옮긴 자', '오딘의 눈', '천둥의 아들', '대지의 수호자'];
    if (rank <= 10) return `🔥 ${pfx} ${seededPick(t6, seed)}`;
    const t11 = ['바다를 가른 자', '서리 거인 사냥꾼', '롱십의 선장', '피오르드 탐험가'];
    return `🌊 ${pfx} ${seededPick(t11, seed)}`;
  } else {
    const pfx = seededPick(VBT_PREFIX, s2);
    if (rank === 1) return `🔥 ${pfx} EXPLOSIVE`;
    if (rank === 2) return `⚡ ${pfx} SPEED DEMON`;
    if (rank === 3) return `💥 ${pfx} POWER MACHINE`;
    const t4 = ['VELOCITY', 'PRECISION', 'DIAMOND', 'FORCE FIELD'];
    if (rank <= 5) return `🚀 ${pfx} ${seededPick(t4, seed)}`;
    const t6 = ['IRON WILL', 'BEAST MODE', 'CHAIN BREAKER', 'VOLCANIC', 'THUNDER LIFT', 'STEEL GRIP'];
    if (rank <= 10) return `💪 ${pfx} ${seededPick(t6, seed)}`;
    const t11 = ['RISING FORCE', 'CHARGING UP', 'GAINS INCOMING', 'RAW POWER'];
    return `🏋️ ${pfx} ${seededPick(t11, seed)}`;
  }
}

// Tier boundaries for dividers
function getTier(rank) {
  if (rank <= 3) return 0;  // 🏆 Top 3
  if (rank <= 5) return 1;  // ⚔️ Elite
  if (rank <= 10) return 2; // 🔥 Challenger
  return 3;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function todayStart() { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString(); }

// ── Tab switching ──
let currentTab = 'both';
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    applyTab();
  });
});

function applyTab() {
  const mj = document.getElementById('panelMjolnir');
  const pw = document.getElementById('panelPower');
  // Reset
  mj.classList.remove('hidden-panel', 'solo');
  pw.classList.remove('hidden-panel', 'solo');

  if (currentTab === 'both') {
    // both visible, normal size
  } else if (currentTab === 'mjolnir') {
    pw.classList.add('hidden-panel');
    mj.classList.add('solo');
  } else {
    mj.classList.add('hidden-panel');
    pw.classList.add('solo');
  }
}

// ── Previous IDs for highlight ──
let prevMjolnirIds = new Set();
let prevPowerIds = new Set();

// ── Render ──
function renderMjolnir(rows) {
  const board = document.getElementById('boardMjolnir');
  const header = board.querySelector('.row-header');
  board.innerHTML = '';
  board.appendChild(header);

  if (!rows.length) {
    board.innerHTML += '<div class="row-empty">아직 기록이 없습니다</div>';
    return;
  }
  const newIds = new Set(rows.map(r => r.id));

  let prevTier = -1;
  rows.forEach((r, i) => {
    const rank = i + 1;
    const tier = getTier(rank);

    // Tier divider
    if (tier !== prevTier && prevTier >= 0) {
      const sep = document.createElement('div');
      sep.className = 'tier-divider';
      board.appendChild(sep);
    }
    prevTier = tier;

    const medal = MEDALS[rank] || '';
    const nickname = r.spoex_registrations?.[0]?.nickname || '???';
    const d = r.set_details || {};
    const score = d.score ?? '-';
    const heightCm = d.height_cm != null ? Number(d.height_cm).toFixed(1) + ' cm' : '-';
    const isNew = !prevMjolnirIds.has(r.id) && prevMjolnirIds.size > 0;
    const topClass = rank <= 3 ? ` top${rank}` : '';
    const title = getTitle(rank, true, r.id);

    // Track newest for spotlight
    if (isNew) showSpotlight(nickname, title, score, rank, true);

    const div = document.createElement('div');
    div.className = `row${topClass}${isNew ? ' highlight' : ''}`;
    div.innerHTML = `
      <div class="col-rank">${medal || rank}</div>
      <div class="col-name">${esc(nickname)}</div>
      <div class="col-title">${esc(title)}</div>
      <div class="col-score">${score}</div>
      <div class="col-sub">${heightCm}</div>
    `;
    board.appendChild(div);
  });
  prevMjolnirIds = newIds;
}

function renderPower(rows) {
  const board = document.getElementById('boardPower');
  const header = board.querySelector('.row-header');
  board.innerHTML = '';
  board.appendChild(header);

  if (!rows.length) {
    board.innerHTML += '<div class="row-empty">아직 기록이 없습니다</div>';
    return;
  }
  const newIds = new Set(rows.map(r => r.id));

  let prevTier = -1;
  rows.forEach((r, i) => {
    const rank = i + 1;
    const tier = getTier(rank);

    if (tier !== prevTier && prevTier >= 0) {
      const sep = document.createElement('div');
      sep.className = 'tier-divider';
      board.appendChild(sep);
    }
    prevTier = tier;

    const medal = MEDALS[rank] || '';
    const nickname = r.spoex_registrations?.[0]?.nickname || '???';
    const d = r.set_details || {};
    const isNew = !prevPowerIds.has(r.id) && prevPowerIds.size > 0;
    const topClass = rank <= 3 ? ` top${rank}` : '';
    const score = Number(d.power_score ?? 0);
    const title = getTitle(rank, false, r.id);

    if (isNew) showSpotlight(nickname, title, score, rank, false);

    const div = document.createElement('div');
    div.className = `row${topClass}${isNew ? ' highlight' : ''}`;
    div.innerHTML = `
      <div class="col-rank">${medal || rank}</div>
      <div class="col-name">${esc(nickname)}</div>
      <div class="col-title">${esc(title)}</div>
      <div class="col-score">${score}</div>
      <div class="col-exercise">${esc(d.exercise || r.exercise_name || '')}</div>
    `;
    board.appendChild(div);
  });
  prevPowerIds = newIds;
}

// ── Spotlight ──
let spotlightTimer = null;
function showSpotlight(name, title, score, rank, isMj) {
  const el = document.getElementById('spotlight');
  el.classList.remove('hidden', 'mj', 'vbt');
  el.classList.add(isMj ? 'mj' : 'vbt');
  document.getElementById('spotName').textContent = name;
  document.getElementById('spotTitle').textContent = title;
  document.getElementById('spotScore').textContent = score;
  document.getElementById('spotRank').textContent = `#${rank}`;
  if (spotlightTimer) clearTimeout(spotlightTimer);
  spotlightTimer = setTimeout(() => {
    el.classList.add('hidden');
    spotlightTimer = null;
  }, 60000); // 1분
}

// ── Fetch ──
async function fetchAll() {
  const start = todayStart();
  const [resultsRes, countRes] = await Promise.all([
    sb.from('spoex_results')
      .select('id, mode, exercise_name, set_details, created_at, spoex_registrations!spoex_registrations_result_id_fkey!inner(nickname)')
      .gte('created_at', start)
      .limit(300),
    sb.from('spoex_registrations')
      .select('id', { count: 'exact', head: true })
      .gte('created_at', start),
  ]);

  const rawRows = resultsRes.data || [];

  // Dedup: same ts = same QR → keep latest only
  const seenTs = new Set();
  const rows = rawRows.filter(r => {
    const ts = r.set_details?.ts;
    if (!ts) return true;
    if (seenTs.has(ts)) return false;
    seenTs.add(ts);
    return true;
  });

  const mjolnirRows = rows
    .filter(r => r.set_details?.source_mode === 'mjolnir')
    .sort((a, b) => Number(b.set_details?.score || 0) - Number(a.set_details?.score || 0))
    .slice(0, 10);

  const powerRows = rows
    .filter(r => r.set_details?.source_mode === 'vbt')
    .sort((a, b) => Number(b.set_details?.power_score || 0) - Number(a.set_details?.power_score || 0))
    .slice(0, 10);

  renderMjolnir(mjolnirRows);
  renderPower(powerRows);

  document.getElementById('statCount').textContent = countRes.count ?? 0;
  document.getElementById('statMjolnirBest').textContent = mjolnirRows[0]?.set_details?.score ?? '-';
  document.getElementById('statPowerBest').textContent = powerRows[0]?.set_details?.power_score ?? '-';
}

// ── Clock / Fullscreen / Realtime ──
function updateClock() {
  const c = document.getElementById('clock');
  if (c) c.textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

document.getElementById('btnFs')?.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
});

sb.channel('leaderboard')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'spoex_registrations' }, () => {
    setTimeout(fetchAll, 500);
  })
  .subscribe();

setInterval(fetchAll, 30000);
fetchAll();
</script>
