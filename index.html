<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1">
<title>SPOEX 2026 Leaderboard</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #5252FA;
    --accent: #BAFC27;
    --bg: #0A0A0F;
    --bg-card: #12121A;
    --text: #EEEEF2;
    --text-dim: #8888A0;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --orange: #FF6B35;

    /* Tier backgrounds */
    --tier-top: #1a1520;
    --tier-elite: #15161e;
    --tier-chall: #111118;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    overflow: hidden;
  }

  /* Scale: transform + inverse dimension to stay within viewport */
  .scale-root {
    transform-origin: top left;
  }

  .container {
    width: 1920px; height: 1080px;
    display: flex; flex-direction: column;
    transform-origin: top left;
  }

  /* Portrait mode: single column layout */
  .container.portrait {
    width: 1080px !important;
    height: 1920px !important;
  }
  .container.portrait main {
    flex-direction: column;
    padding: 20px 24px 0;
  }
  .container.portrait .panel {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .container.portrait .col-title { display: none; }
  .container.portrait .col-sub { display: none; }
  .container.portrait .col-exercise { display: none; }
  .container.portrait .row,
  .container.portrait .row-header {
    display: grid;
    grid-template-columns: 50px minmax(0, 1fr) 120px;
    align-items: center;
    gap: 8px;
  }
  .container.portrait .col-rank { width: auto; font-size: 22px; }
  .container.portrait .col-name { width: auto; font-size: 20px; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .container.portrait .col-score { width: auto; font-size: 28px; text-align: right; justify-self: end; }
  .container.portrait .row { height: 56px; padding: 0 16px; max-width: 100%; overflow: hidden; }
  .container.portrait .row-header { max-width: 100%; overflow: hidden; }
  .container.portrait .board { overflow: hidden; max-width: 100%; }
  .container.portrait .panel.solo .col-title { display: none; }
  .container.portrait .panel.solo .col-sub { display: none; }
  .container.portrait .panel.solo .col-rank { width: auto; font-size: 22px; }
  .container.portrait .panel.solo .col-name { width: auto; font-size: 20px; }
  .container.portrait .panel.solo .col-score { width: auto; font-size: 28px; }
  .container.portrait .panel.solo .row { height: 56px; padding: 0 16px; }
  .container.portrait header {
    height: 80px;
    padding: 0 24px;
  }
  .container.portrait footer {
    height: 56px;
    padding: 0 24px;
  }

  /* ── Mobile responsive ── */
  @media (max-width: 1024px) {
    header {
      height: auto;
      flex-wrap: wrap;
      padding: 12px 16px;
      gap: 8px;
    }
    .header-left { order: 1; }
    .header-center { order: 3; width: 100%; justify-content: center; }
    .header-right { order: 2; margin-left: auto; }
    .clock { font-size: 18px; }

    main {
      flex-direction: column;
      padding: 12px 16px 0;
      overflow-y: auto;
    }
    .panel {
      flex: none;
      min-height: 400px;
    }
    .row { height: 52px; }
    .col-title, .panel .col-title, .panel.solo .col-title { display: none !important; }
    .col-sub, .panel .col-sub, .panel.solo .col-sub { display: none !important; }
    .col-exercise, .panel .col-exercise { display: none !important; }
    .col-rank, .panel .col-rank, .panel.solo .col-rank { width: 36px !important; font-size: 16px !important; }
    .col-name, .panel .col-name, .panel.solo .col-name { font-size: 15px !important; }
    .col-score, .panel .col-score, .panel.solo .col-score { font-size: 18px !important; width: 80px !important; }
    .row, .panel .row, .panel.solo .row { height: 48px !important; padding: 0 8px !important; }
    .row-header { display: none !important; }
    .panel-header { padding: 12px 16px 10px !important; }
    .panel-title { font-size: 18px !important; }
    .panel-icon { font-size: 24px !important; }
    .board { padding: 0 8px 8px !important; }
    main { width: 100vw !important; max-width: 100vw !important; padding: 12px 8px 0 !important; }
    .panel { max-width: 100% !important; width: 100% !important; }
    .row { max-width: 100% !important; }
    .col-name, .panel .col-name, .panel.solo .col-name { flex: 1 1 0 !important; min-width: 0 !important; overflow: hidden !important; text-overflow: ellipsis !important; }

    footer {
      flex-wrap: wrap;
      padding: 8px 16px;
      gap: 8px;
      height: auto;
    }
    footer .stat { font-size: 14px; }
    footer .stat b { font-size: 22px; }
  }

  /* ── HEADER ── */
  header {
    height: 100px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: linear-gradient(180deg, #111118 0%, var(--bg) 100%);
    border-bottom: 1px solid #222233;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { height: 36px; filter: brightness(0) invert(1); }
  .event-badge {
    background: var(--primary); color: #fff;
    font-size: 14px; font-weight: 700;
    padding: 5px 14px; border-radius: 6px; letter-spacing: 1px;
  }
  .btn-settings {
    background: transparent; border: 1px solid #333; color: var(--text-dim);
    font-size: 18px; width: 36px; height: 36px; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  .header-center { display: flex; gap: 4px; }
  .tab-btn {
    background: transparent; border: 1px solid #333; color: var(--text-dim);
    font-size: 14px; font-weight: 600; padding: 8px 20px; border-radius: 8px;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  .tab-btn:hover { border-color: #555; color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 800; }

  .header-right { display: flex; align-items: center; gap: 28px; }
  .live-dot {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; color: var(--accent);
  }
  .live-dot::before {
    content: ''; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(186,252,39,.6); }
    50% { opacity: .7; box-shadow: 0 0 0 8px rgba(186,252,39,0); }
  }
  .clock { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .btn-fs {
    background: transparent; border: 1px solid #444; color: var(--text-dim);
    font-size: 13px; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  .btn-fs:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Settings Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1a1a25; border: 1px solid #333; border-radius: 16px;
    padding: 32px; width: 400px;
  }
  .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
  .modal label { display: block; font-size: 14px; color: var(--text-dim); margin-bottom: 6px; }
  .modal input[type="range"] { width: 100%; accent-color: var(--accent); }
  .modal .scale-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .modal .close-btn {
    margin-top: 20px; width: 100%; padding: 10px; border: none; border-radius: 8px;
    background: var(--accent); color: #000; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: inherit;
  }

  /* ── MAIN ── */
  main {
    flex: 1; display: flex; gap: 20px;
    padding: 20px 48px 0; min-height: 0;
  }

  .panel {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg-card); border-radius: 16px;
    border: 1px solid #222233; overflow: visible;
    transition: flex .3s;
  }
  .panel.hidden-panel { display: none; }

  .panel-header {
    padding: 20px 28px 16px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .panel-icon { font-size: 32px; line-height: 1; }
  .panel-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .panel-title span { color: var(--text-dim); font-weight: 500; font-size: 16px; margin-left: 8px; }

  .panel.mjolnir .panel-header { border-bottom: 3px solid var(--orange); }
  .panel.power .panel-header { border-bottom: 3px solid var(--accent); }

  /* ── TABLE ── */
  .board {
    flex: 1; display: flex; flex-direction: column;
    padding: 0 16px 12px; min-height: 0;
    overflow: hidden;
  }

  .row-header, .row {
    display: flex; align-items: center;
    padding: 0 16px; border-radius: 10px; flex-shrink: 0;
  }

  .row-header {
    height: 36px; font-size: 12px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }

  .row {
    height: 62px; margin-bottom: 3px;
    transition: all .3s;
    border-radius: 10px;
  }

  /* Tier-based backgrounds */
  .row.tier-top { background: linear-gradient(90deg, #201828 0%, #18141e 100%); }
  .row.tier-elite { background: linear-gradient(90deg, #181a24 0%, #14151c 100%); }
  .row.tier-chall { background: #111118; }
  .row.tier-chall:nth-child(even) { background: #0e0e14; }

  .row.top1 { background: linear-gradient(90deg, rgba(255,215,0,.15) 0%, #201828 60%); border-left: 3px solid var(--gold); }
  .row.top2 { background: linear-gradient(90deg, rgba(192,192,192,.10) 0%, #201828 60%); border-left: 3px solid var(--silver); }
  .row.top3 { background: linear-gradient(90deg, rgba(205,127,50,.10) 0%, #201828 60%); border-left: 3px solid var(--bronze); }

  .row.highlight { animation: highlight-pulse 2.5s ease-out; }
  @keyframes highlight-pulse {
    0% { background: rgba(186,252,39,.25); transform: scale(1.01); }
    100% { background: transparent; transform: scale(1); }
  }

  /* Solo tab: bigger everything */
  .panel.solo .board { padding: 0 24px 12px; }
  .panel.solo .row { height: 70px; margin-bottom: 4px; padding: 0 24px; }
  .panel.solo .col-rank { width: 80px; font-size: 34px; }
  .panel.solo .row.top1 .col-rank,
  .panel.solo .row.top2 .col-rank,
  .panel.solo .row.top3 .col-rank { font-size: 40px; }
  .panel.solo .col-name { font-size: 30px; }
  .panel.solo .col-title { font-size: 19px; width: 360px; }
  .panel.solo .col-score { font-size: 42px; width: 200px; }
  .panel.solo .col-sub { font-size: 19px; width: 150px; }
  .panel.solo .col-exercise { font-size: 19px; width: 180px; }
  .panel.solo .panel-title { font-size: 30px; }
  .panel.solo .panel-icon { font-size: 38px; }
  .panel.solo .row-header { font-size: 14px; height: 40px; }

  .col-rank { width: 60px; text-align: center; font-size: 22px; font-weight: 800; }
  .row.top1 .col-rank, .row.top2 .col-rank, .row.top3 .col-rank { font-size: 28px; }

  .col-name {
    flex: 1 1 0; min-width: 0; font-size: 20px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .col-title {
    width: 260px; font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 16px;
  }

  .col-score {
    width: 140px; text-align: right;
    font-size: 28px; font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .col-sub {
    width: 100px; text-align: right;
    font-size: 14px; padding-left: 8px; font-weight: 600;
  }

  .col-exercise {
    width: 130px; text-align: right;
    font-size: 14px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-empty {
    display: flex; align-items: center; justify-content: center;
    flex: 1; color: var(--text-dim); font-size: 18px;
  }

  /* Spotlight banner */
  .spotlight {
    background: linear-gradient(90deg, rgba(186,252,39,.12), rgba(82,82,250,.08), transparent);
    border: 1px solid rgba(186,252,39,.35);
    border-radius: 12px; padding: 12px 24px; margin: 0 48px 8px;
    display: flex; align-items: center; gap: 20px;
    animation: spotlight-glow 2s ease-in-out infinite alternate;
    flex-shrink: 0;
  }
  .spotlight.hidden { display: none; }
  @keyframes spotlight-glow {
    from { border-color: rgba(186,252,39,.35); }
    to { border-color: rgba(186,252,39,.65); }
  }
  .spotlight-new { font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
  .spotlight-name { font-size: 24px; font-weight: 800; }
  .spotlight-title { font-size: 16px; font-weight: 600; }
  .spotlight-score { font-size: 28px; font-weight: 900; margin-left: auto; font-variant-numeric: tabular-nums; }
  .spotlight-rank { font-size: 16px; color: var(--text-dim); white-space: nowrap; }

  /* ── FOOTER ── */
  footer {
    height: 72px;
    display: flex; align-items: center; justify-content: center;
    gap: 60px; padding: 0 48px;
    background: linear-gradient(0deg, #111118 0%, var(--bg) 100%);
    border-top: 1px solid #222233; flex-shrink: 0;
  }
  .stat { display: flex; align-items: center; gap: 10px; }
  .stat-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }
  .stat-value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.primary { color: var(--orange); }
  .stat-divider { width: 1px; height: 32px; background: #333; }
  .power-desc { font-size: 13px; color: var(--text-dim); max-width: 400px; }

  /* ── BG glow ── */
  .glow-left, .glow-right {
    position: fixed; width: 500px; height: 500px;
    border-radius: 50%; filter: blur(200px); opacity: .08;
    pointer-events: none; z-index: -1;
  }
  .glow-left { top: 200px; left: -100px; background: var(--primary); }
  .glow-right { top: 200px; right: -100px; background: var(--accent); }
</style>
</head>
<body>

<div class="glow-left"></div>
<div class="glow-right"></div>

<!-- Settings Modal -->

    <h3>⚙️ 디스플레이 설정</h3>

<script>
const SUPABASE_URL = 'https://ssidizurrvnfmqbvfsqr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaWRpenVycnZuZm1xYnZmc3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDg1OTgsImV4cCI6MjA4NzQyNDU5OH0.3UMwz8QPAOoN_hFu-EaheLQunHdpJk_WvMjxuiONRSI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const MEDALS = ['', '🥇', '🥈', '🥉'];

// ── Settings / Scale ──
// Base = 150% of original (solo sizes already big). Slider 50-200% relative to that.
// We scale the container and inverse-scale its dimensions to fit viewport.
const scaleSlider = document.getElementById('scaleSlider');
const scaleVal = document.getElementById('scaleVal');
const scaleRoot = document.getElementById('scaleRoot');
const container = scaleRoot.querySelector('.container');
const BASE_W = 1920, BASE_H = 1080;

const saved = localStorage.getItem('lb_scale');
if (saved) { scaleSlider.value = saved; }
function applyScale() {
  const pct = Number(scaleSlider.value);
  scaleVal.textContent = pct + '%';
  // Actual scale factor (100% slider = 1.0)
  const s = pct / 100;
  // Scale the root, but shrink the container dimensions inversely so it still fits in viewport
  scaleRoot.style.transform = `scale(${s})`;
  scaleRoot.style.width = (BASE_W / s) + 'px';
  scaleRoot.style.height = (BASE_H / s) + 'px';
  container.style.width = (BASE_W / s) + 'px';
  container.style.height = (BASE_H / s) + 'px';
  localStorage.setItem('lb_scale', pct);
}
scaleSlider.addEventListener('input', applyScale);
applyScale();

document.getElementById('btnSettings').addEventListener('click', () => {
  document.getElementById('settingsModal').classList.add('show');
});
document.getElementById('closeSettings').addEventListener('click', () => {
  document.getElementById('settingsModal').classList.remove('show');
});
document.getElementById('settingsModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ── Title System ──
function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function seededPick(arr, seed) { return arr[seed % arr.length]; }

// Title color palettes (per-tier themed)
const TITLE_COLORS_MJ = {
  top: ['#FFD700', '#FF9F1C', '#FF6B35', '#FF4444'],
  elite: ['#E07CFF', '#B388FF', '#9C7CFF', '#8B5CF6'],
  chall: ['#6E9AFF', '#5B8DEF', '#4A7FDE', '#3D72CC'],
};
const TITLE_COLORS_VBT = {
  top: ['#BAFC27', '#8EF509', '#6BEC00', '#4DE600'],
  elite: ['#00E5FF', '#00BCD4', '#0097A7', '#26C6DA'],
  chall: ['#78909C', '#90A4AE', '#B0BEC5', '#8E99A4'],
};

function getTitleColor(rank, isMj, seed) {
  const palette = isMj ? TITLE_COLORS_MJ : TITLE_COLORS_VBT;
  let tier;
  if (rank <= 3) tier = palette.top;
  else if (rank <= 5) tier = palette.elite;
  else tier = palette.chall;
  return seededPick(tier, seed);
}

// Score color: higher = more vivid, lower = dimmer
function getScoreColor(score, maxScore, isMj) {
  if (!maxScore || maxScore === 0) return isMj ? 'var(--orange)' : 'var(--accent)';
  const ratio = Math.min(score / maxScore, 1);
  const alpha = 0.35 + ratio * 0.65; // 35% → 100% opacity
  if (isMj) return `rgba(255, 107, 53, ${alpha})`;
  return `rgba(186, 252, 39, ${alpha})`;
}

const titleCache = {};
function getTitle(rank, isMj, id) {
  const key = id || `${rank}-${isMj}`;
  if (titleCache[key]) return titleCache[key];
  const seed = hashCode(key);
  const t = _genTitle(rank, isMj, seed);
  const color = getTitleColor(rank, isMj, seed);
  titleCache[key] = { text: t, color };
  return titleCache[key];
}

const MJ_PREFIX = ['전설의', '불멸의', '고대의', '최후의', '진정한', '광기의', '폭풍의', '얼음의', '불꽃의', '영원의', '어둠의', '신성한', '무적의', '강철의'];
const VBT_PREFIX = ['ULTRA', 'MEGA', 'HYPER', 'SUPREME', 'PRIME', 'ELITE', 'APEX', 'OMEGA', 'TURBO', 'CORE', 'FURY', 'MAX', 'NEO', 'TITAN'];

function _genTitle(rank, isMj, seed) {
  const s2 = (seed * 2654435761 >>> 0) % 9999;
  if (isMj) {
    const pfx = seededPick(MJ_PREFIX, s2);
    if (rank === 1) return `⚡ ${pfx} 토르의 후계자`;
    if (rank === 2) return `🔨 ${pfx} 묠니르의 주인`;
    if (rank === 3) return `🛡️ ${pfx} 아스가르드 전사`;
    const t4 = ['바이킹 챔피언', '발할라 입성자', '울프 워리어', '전장의 사자'];
    if (rank <= 5) return `⚔️ ${pfx} ${seededPick(t4, seed)}`;
    const t6 = ['미드가르드의 힘', '버서커', '산을 옮긴 자', '오딘의 눈', '천둥의 아들', '대지의 수호자'];
    if (rank <= 10) return `🔥 ${pfx} ${seededPick(t6, seed)}`;
    const t11 = ['바다를 가른 자', '서리 거인 사냥꾼', '롱십의 선장', '피오르드 탐험가'];
    return `🌊 ${pfx} ${seededPick(t11, seed)}`;
  } else {
    const pfx = seededPick(VBT_PREFIX, s2);
    if (rank === 1) return `🔥 ${pfx} EXPLOSIVE`;
    if (rank === 2) return `⚡ ${pfx} SPEED DEMON`;
    if (rank === 3) return `💥 ${pfx} POWER MACHINE`;
    const t4 = ['VELOCITY', 'PRECISION', 'DIAMOND', 'FORCE FIELD'];
    if (rank <= 5) return `🚀 ${pfx} ${seededPick(t4, seed)}`;
    const t6 = ['IRON WILL', 'BEAST MODE', 'CHAIN BREAKER', 'VOLCANIC', 'THUNDER LIFT', 'STEEL GRIP'];
    if (rank <= 10) return `💪 ${pfx} ${seededPick(t6, seed)}`;
    const t11 = ['RISING FORCE', 'CHARGING UP', 'GAINS INCOMING', 'RAW POWER'];
    return `🏋️ ${pfx} ${seededPick(t11, seed)}`;
  }
}

function getTier(rank) {
  if (rank <= 3) return 'top';
  if (rank <= 5) return 'elite';
  return 'chall';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function todayStart() { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString(); }

// ── Tab switching ──
let currentTab = 'both';
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    applyTab();
  });
});

function applyTab() {
  const mj = document.getElementById('panelMjolnir');
  const pw = document.getElementById('panelPower');
  mj.classList.remove('hidden-panel', 'solo');
  pw.classList.remove('hidden-panel', 'solo');
  if (currentTab === 'mjolnir') { pw.classList.add('hidden-panel'); mj.classList.add('solo'); }
  else if (currentTab === 'power') { mj.classList.add('hidden-panel'); pw.classList.add('solo'); }
}

// ── Render ──
let prevMjolnirIds = new Set();
let prevPowerIds = new Set();

function renderMjolnir(rows) {
  const board = document.getElementById('boardMjolnir');
  const header = board.querySelector('.row-header');
  board.innerHTML = '';
  board.appendChild(header);

  if (!rows.length) { board.innerHTML += '<div class="row-empty">아직 기록이 없습니다</div>'; return; }
  const newIds = new Set(rows.map(r => r.id));
  const maxScore = Number(rows[0]?.set_details?.score || 1);

  rows.forEach((r, i) => {
    const rank = i + 1;
    const tier = getTier(rank);
    const medal = MEDALS[rank] || '';
    const nickname = r.spoex_registrations?.[0]?.nickname || '???';
    const d = r.set_details || {};
    const score = d.score ?? '-';
    const scoreNum = Number(score) || 0;

    // Height as shoulder percentage
    const heightCm = d.height_cm ? Number(d.height_cm) : null;
    const shoulderCm = d.shoulder_cm ? Number(d.shoulder_cm) : null;
    const pct = (heightCm && shoulderCm) ? ((heightCm / shoulderCm) * 100).toFixed(1) + '%' : (heightCm ? heightCm.toFixed(1) + 'cm' : '-');

    const isNew = !prevMjolnirIds.has(r.id) && prevMjolnirIds.size > 0;
    const topClass = rank <= 3 ? ` top${rank}` : '';
    const title = getTitle(rank, true, r.id);

    if (isNew) showSpotlight(nickname, title.text, score, rank, true);

    const scoreColor = getScoreColor(scoreNum, maxScore, true);
    const pctColor = getScoreColor(scoreNum, maxScore, true); // same fade

    const div = document.createElement('div');
    div.className = `row tier-${tier}${topClass}${isNew ? ' highlight' : ''}`;
    div.innerHTML = `
      <div class="col-rank">${medal || rank}</div>
      <div class="col-name">${esc(nickname)}</div>
      <div class="col-title" style="color:${title.color}">${esc(title.text)}</div>
      <div class="col-score" style="color:${scoreColor}">${score}</div>
      <div class="col-sub" style="color:${pctColor}">${pct}</div>
    `;
    board.appendChild(div);
  });
  prevMjolnirIds = newIds;
}

function renderPower(rows) {
  const board = document.getElementById('boardPower');
  const header = board.querySelector('.row-header');
  board.innerHTML = '';
  board.appendChild(header);

  if (!rows.length) { board.innerHTML += '<div class="row-empty">아직 기록이 없습니다</div>'; return; }
  const newIds = new Set(rows.map(r => r.id));
  const maxScore = Number(rows[0]?.set_details?.power_score || 1);

  rows.forEach((r, i) => {
    const rank = i + 1;
    const tier = getTier(rank);
    const medal = MEDALS[rank] || '';
    const nickname = r.spoex_registrations?.[0]?.nickname || '???';
    const d = r.set_details || {};
    const isNew = !prevPowerIds.has(r.id) && prevPowerIds.size > 0;
    const topClass = rank <= 3 ? ` top${rank}` : '';
    const score = Number(d.power_score ?? 0);
    const title = getTitle(rank, false, r.id);

    if (isNew) showSpotlight(nickname, title.text, score, rank, false);

    const scoreColor = getScoreColor(score, maxScore, false);

    const div = document.createElement('div');
    div.className = `row tier-${tier}${topClass}${isNew ? ' highlight' : ''}`;
    div.innerHTML = `
      <div class="col-rank">${medal || rank}</div>
      <div class="col-name">${esc(nickname)}</div>
      <div class="col-title" style="color:${title.color}">${esc(title.text)}</div>
      <div class="col-score" style="color:${scoreColor}">${score}</div>
      <div class="col-exercise">${esc(d.exercise || r.exercise_name || '')}</div>
    `;
    board.appendChild(div);
  });
  prevPowerIds = newIds;
}

// ── Spotlight ──
let spotlightTimer = null;
function showSpotlight(name, titleText, score, rank, isMj) {
  const el = document.getElementById('spotlight');
  el.classList.remove('hidden', 'mj', 'vbt');
  el.classList.add(isMj ? 'mj' : 'vbt');
  document.getElementById('spotName').textContent = name;
  document.getElementById('spotTitle').textContent = titleText;
  document.getElementById('spotScore').textContent = score;
  document.getElementById('spotRank').textContent = `#${rank}`;
  if (spotlightTimer) clearTimeout(spotlightTimer);
  spotlightTimer = setTimeout(() => { el.classList.add('hidden'); spotlightTimer = null; }, 60000);
}

// ── Fetch ──
async function fetchAll() {
  const start = todayStart();
  const [resultsRes, countRes] = await Promise.all([
    sb.from('spoex_results')
      .select('id, mode, exercise_name, set_details, created_at, spoex_registrations!spoex_registrations_result_id_fkey!inner(nickname)')
      .gte('created_at', start).limit(300),
    sb.from('spoex_registrations')
      .select('id', { count: 'exact', head: true }).gte('created_at', start),
  ]);

  const rawRows = resultsRes.data || [];
  const seenTs = new Set();
  const rows = rawRows.filter(r => {
    const ts = r.set_details?.ts;
    if (!ts) return true;
    if (seenTs.has(ts)) return false;
    seenTs.add(ts); return true;
  });

  const mjolnirRows = rows.filter(r => r.set_details?.source_mode === 'mjolnir')
    .sort((a, b) => Number(b.set_details?.score || 0) - Number(a.set_details?.score || 0)).slice(0, 10);
  const powerRows = rows.filter(r => r.set_details?.source_mode === 'vbt')
    .sort((a, b) => Number(b.set_details?.power_score || 0) - Number(a.set_details?.power_score || 0)).slice(0, 10);

  renderMjolnir(mjolnirRows);
  renderPower(powerRows);

  document.getElementById('statCount').textContent = countRes.count ?? 0;
  document.getElementById('statMjolnirBest').textContent = mjolnirRows[0]?.set_details?.score ?? '-';
  document.getElementById('statPowerBest').textContent = powerRows[0]?.set_details?.power_score ?? '-';
}

// ── Clock / Fullscreen / Realtime ──
function updateClock() {
  const c = document.getElementById('clock');
  if (c) c.textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
}
setInterval(updateClock, 1000); updateClock();

document.getElementById('btnFs')?.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
});

sb.channel('leaderboard')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'spoex_registrations' }, () => {
    setTimeout(fetchAll, 500);
  }).subscribe();

setInterval(fetchAll, 30000);
fetchAll();

// ── Auto-scale to fit viewport ──
function autoScale() {
  const container = document.querySelector('.container');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const isPortrait = vh > vw;

  if (isPortrait) {
    container.classList.add('portrait');
    container.classList.remove('landscape');
    const designW = 1080, designH = 1920;
    const scale = Math.min(vw / designW, vh / designH);
    container.style.transform = `scale(${scale})`;
  } else {
    container.classList.remove('portrait');
    container.classList.add('landscape');
    const designW = 1920, designH = 1080;
    const scale = Math.min(vw / designW, vh / designH);
    container.style.transform = `scale(${scale})`;
  }
}
autoScale();
window.addEventListener('resize', autoScale);
</script>
